<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <style id="current-color-scheme" type="text/css">
      .ColorScheme-Text { color: #232629; }
      .ColorScheme-Highlight { color: #3daee9; }
    </style>
  </defs>
  <!-- Speech bubble body -->
  <rect class="ColorScheme-Text" fill="none" stroke="currentColor" stroke-width="2"
        x="2" y="6" width="28" height="22" rx="4"/>
  <!-- Speech bubble tail -->
  <path class="ColorScheme-Text" fill="currentColor"
        d="M8 28 L8 38 L16 28"/>
  <!-- Three dots (message indicator) -->
  <circle class="ColorScheme-Text" fill="currentColor" cx="10" cy="17" r="2"/>
  <circle class="ColorScheme-Text" fill="currentColor" cx="16" cy="17" r="2"/>
  <circle class="ColorScheme-Text" fill="currentColor" cx="22" cy="17" r="2"/>
  <!-- Connectivity arcs (KDE Connect) — accent color -->
  <path class="ColorScheme-Highlight" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round"
        d="M36 22 Q42 17 36 12"/>
  <path class="ColorScheme-Highlight" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round"
        d="M38 26 Q48 17 38 8"/>
</svg>
