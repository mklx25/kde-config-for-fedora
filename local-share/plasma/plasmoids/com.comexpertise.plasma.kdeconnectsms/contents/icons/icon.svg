<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <defs>
    <style id="current-color-scheme" type="text/css">
      .ColorScheme-Text { color: #232629; }
      .ColorScheme-Highlight { color: #3daee9; }
    </style>
  </defs>
  <!-- Speech bubble body -->
  <rect class="ColorScheme-Text" fill="none" stroke="currentColor" stroke-width="1"
        x="1" y="4" width="14" height="11" rx="2"/>
  <!-- Speech bubble tail -->
  <path class="ColorScheme-Text" fill="currentColor"
        d="M4 15 L4 19 L8 15"/>
  <!-- Three dots (message indicator) -->
  <rect class="ColorScheme-Text" fill="currentColor" x="4" y="9" width="2" height="2"/>
  <rect class="ColorScheme-Text" fill="currentColor" x="7.5" y="9" width="2" height="2"/>
  <rect class="ColorScheme-Text" fill="currentColor" x="11" y="9" width="2" height="2"/>
  <!-- Connectivity arcs (KDE Connect) — accent color -->
  <path class="ColorScheme-Highlight" fill="none" stroke="currentColor" stroke-width="1"
        stroke-linecap="round"
        d="M17 10 Q20 8 17 6"/>
  <path class="ColorScheme-Highlight" fill="none" stroke="currentColor" stroke-width="1"
        stroke-linecap="round"
        d="M18 12 Q22 8 18 4"/>
</svg>
